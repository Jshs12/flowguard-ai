events {
    worker_connections 1024;
}

http {

    # ── Backend upstream — load balance across 2 workers ──
    upstream flowguard_backend {
        least_conn;
        server flowguard-backend:8001 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Frontend upstream ─────────────────────────────────
    upstream flowguard_frontend {
        server flowguard-frontend:80;
        keepalive 16;
    }

    # ── Rate limiting ─────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # ── Main server block ─────────────────────────────────
    server {
        listen 8080;
        server_name _;

        # Frontend
        location / {
            proxy_pass         http://flowguard_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # API — rate limited
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://flowguard_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # Health check endpoint — no rate limit
        location /health {
            proxy_pass http://flowguard_backend/api/health;
            access_log off;
        }
    }
}