apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowguard-frontend
  namespace: flowguard
  labels:
    app: flowguard-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flowguard-frontend
  template:
    metadata:
      labels:
        app: flowguard-frontend
    spec:
      containers:
        - name: flowguard-frontend
          image: flowguard-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: flowguard-frontend-svc
  namespace: flowguard
spec:
  selector:
    app: flowguard-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
# ── Ingress (Load Balancer entry point) ──────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flowguard-ingress
  namespace: flowguard
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: flowguard-backend-svc
                port:
                  number: 8001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flowguard-frontend-svc
                port:
                  number: 80