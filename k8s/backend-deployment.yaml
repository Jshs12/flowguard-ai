apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowguard-backend
  namespace: flowguard
  labels:
    app: flowguard-backend
spec:
  replicas: 2                         # 2 backend pods for load balancing
  selector:
    matchLabels:
      app: flowguard-backend
  template:
    metadata:
      labels:
        app: flowguard-backend
    spec:
      containers:
        - name: flowguard-backend
          image: flowguard-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flowguard-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_KEY
              valueFrom:
                secretKeyRef:
                  name: flowguard-secrets
                  key: SUPABASE_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: flowguard-secrets
                  key: OPENAI_API_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: flowguard-secrets
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: flowguard-backend-svc
  namespace: flowguard
spec:
  selector:
    app: flowguard-backend
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
  type: ClusterIP